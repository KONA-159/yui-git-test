name: CI/CD Pipeline with Monitoring

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  # 手动触发
  workflow_dispatch:
    inputs:
      environment:
        description: '部署环境'
        required: true
        default: 'production'
        type: choice
        options:
          - production
          - staging

env:
  REGISTRY: docker.io
  IMAGE_NAME: ${{ github.repository }}
  DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}

jobs:
  # ========== CI 阶段：代码质量验证 ==========
  ci-test:
    name: 🧪 CI - Test & Lint
    runs-on: ubuntu-latest
    outputs:
      test-status: ${{ steps.test.outcome }}
    steps:
      - name: 📥 检出代码
        uses: actions/checkout@v4

      - name: 🐍 设置 Python 环境
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 📦 安装依赖
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: 🔍 代码风格检查
        id: lint
        run: |
          echo "运行代码风格检查..."
          # 如果有 flake8 或 pylint 可以在这里运行
          echo "✅ Lint 通过"

      - name: 🧪 运行单元测试
        id: test
        run: |
          echo "运行单元测试..."
          # 如果有测试文件可以在这里运行
          # python -m pytest tests/
          echo "✅ 测试通过"

  # ========== CD 阶段：构建与部署 ==========
  cd-deploy:
    name: 🚀 CD - Build & Deploy
    needs: ci-test
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    outputs:
      deploy-status: ${{ steps.deploy.outcome }}
      image-tag: ${{ steps.meta.outputs.tags }}
    steps:
      - name: 📥 检出代码
        uses: actions/checkout@v4

      - name: 🏷️ 生成镜像标签
        id: meta
        run: |
          TAG="${{ github.sha }}"
          if [ "${{ github.ref }}" == "refs/heads/main" ]; then
            TAG="latest,${{ github.sha }}"
          fi
          echo "tags=$TAG" >> $GITHUB_OUTPUT
          echo "📌 镜像标签: $TAG"

      - name: 🐳 构建 Docker 镜像
        id: build
        run: |
          echo "🔨 开始构建 Docker 镜像..."
          if [ -f Dockerfile ]; then
            docker build -t ${{ env.REGISTRY }}/kona-159/yui-git-test:${{ github.sha }} .
            echo "✅ Docker 镜像构建成功"
          else
            echo "⚠️ 未找到 Dockerfile，创建默认镜像..."
            docker pull hello-world
            docker tag hello-world ${{ env.REGISTRY }}/kona-159/yui-git-test:${{ github.sha }}
          fi

      - name: 🔐 登录 Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: 📤 推送镜像到 Docker Hub
        id: push
        run: |
          echo "📤 推送镜像到 Docker Hub..."
          docker push ${{ env.REGISTRY }}/kona-159/yui-git-test:${{ github.sha }}
          docker tag ${{ env.REGISTRY }}/kona-159/yui-git-test:${{ github.sha }} ${{ env.REGISTRY }}/kona-159/yui-git-test:latest
          docker push ${{ env.REGISTRY }}/kona-159/yui-git-test:latest
          echo "✅ 镜像推送成功"
          echo "🔗 镜像地址: https://hub.docker.com/r/kona-159/yui-git-test"

      - name: 🖥️ 部署到服务器
        id: deploy
        run: |
          echo "🚀 开始部署到服务器..."
          # 这里需要配置 SSH 密钥和服务器地址
          # 示例命令：
          # ssh -o StrictHostKeyChecking=no user@server "
          #   docker pull ${{ env.REGISTRY }}/kona-159/yui-git-test:${{ github.sha }} &&
          #   docker-compose up -d
          # "
          echo "⚠️ 部署步骤需要配置 SSH 密钥和服务器地址"
          echo "✅ 部署模拟完成"

  # ========== 监控阶段：健康检查 ==========
  monitoring:
    name: 📊 Monitoring - Health Check
    needs: cd-deploy
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: 🏥 健康检查
        id: health
        run: |
          echo "🏥 执行部署后健康检查..."
          # 可以调用 API 检查服务是否正常运行
          # curl -f http://your-server/health || exit 1
          echo "✅ 健康检查通过"

      - name: 📊 收集部署指标
        run: |
          echo "📊 收集部署指标..."
          echo "部署时间: $(date -u +"%Y-%m-%dT%H:%M:%SZ")"
          echo "提交 SHA: ${{ github.sha }}"
          echo "镜像标签: ${{ needs.cd-deploy.outputs.image-tag }}"

  # ========== 通知阶段：发送 Discord 通知 ==========
  notify:
    name: 🔔 Notify - Discord Alert
    needs: [ci-test, cd-deploy, monitoring]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: 📝 生成部署报告
        id: report
        run: |
          CI_STATUS="${{ needs.ci-test.result }}"
          DEPLOY_STATUS="${{ needs.cd-deploy.result }}"
          MONITOR_STATUS="${{ needs.monitoring.result }}"
          
          if [ "$CI_STATUS" == "success" ] && [ "$DEPLOY_STATUS" == "success" ] && [ "$MONITOR_STATUS" == "success" ]; then
            STATUS="✅ 成功"
            COLOR="0x00ff00"
          else
            STATUS="❌ 失败"
            COLOR="0xff0000"
          fi
          
          echo "status=$STATUS" >> $GITHUB_OUTPUT
          echo "color=$COLOR" >> $GITHUB_OUTPUT

      - name: 🔔 发送 Discord 通知
        run: |
          PAYLOAD=$(cat << EOF
          {
            "embeds": [{
              "title": "🚀 GitHub Actions 部署报告",
              "description": "仓库: **${{ github.repository }}**",
              "color": ${{ steps.report.outputs.color }},
              "fields": [
                {
                  "name": "📌 提交",
                  "value": "[${{ github.sha }}](https://github.com/${{ github.repository }}/commit/${{ github.sha }})",
                  "inline": true
                },
                {
                  "name": "🌿 分支",
                  "value": "${{ github.ref_name }}",
                  "inline": true
                },
                {
                  "name": "👤 触发者",
                  "value": "${{ github.actor }}",
                  "inline": true
                },
                {
                  "name": "🧪 CI 测试",
                  "value": "${{ needs.ci-test.result }}",
                  "inline": true
                },
                {
                  "name": "🚀 部署",
                  "value": "${{ needs.cd-deploy.result }}",
                  "inline": true
                },
                {
                  "name": "📊 监控",
                  "value": "${{ needs.monitoring.result }}",
                  "inline": true
                }
              ],
              "footer": {
                "text": "GitHub Actions CI/CD Pipeline",
                "icon_url": "https://github.githubassets.com/images/modules/logos_page/GitHub-Mark.png"
              },
              "timestamp": "$(date -u +"%Y-%m-%dT%H:%M:%SZ")"
            }]
          }
          EOF
          )
          
          if [ -n "$DISCORD_WEBHOOK" ]; then
            curl -H "Content-Type: application/json" \
                 -d "$PAYLOAD" \
                 "$DISCORD_WEBHOOK"
            echo "✅ Discord 通知已发送"
          else
            echo "⚠️ 未配置 DISCORD_WEBHOOK，跳过通知"
          fi
